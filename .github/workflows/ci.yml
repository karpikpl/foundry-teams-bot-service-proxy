name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # PR / branch builds: verify the Dockerfile builds cleanly against the
      # runner's local docker daemon. No registry push, no buildx — buildx pulls
      # moby/buildkit from Docker Hub which is rate-limited / flaky for
      # unauthenticated runners. Multi-arch + push happens in release.yml.
      - name: Build image (no push)
        run: docker build -t foundry-teams-bot-service-proxy:ci .
