<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Foundry Agent Test Chat</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#f3f4f6;color:#1f2328}
  .app{display:flex;flex-direction:column;height:100%;max-width:880px;margin:0 auto;background:#fff;border-left:1px solid #d0d7de;border-right:1px solid #d0d7de}
  header{background:#0d1117;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  header h1{margin:0;font-size:16px;font-weight:600;flex:1}
  header select{padding:6px 10px;border-radius:6px;border:0;font-size:13px;background:#21262d;color:#fff}
  header button{background:#21262d;color:#fff;border:0;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer}
  header button:hover{background:#30363d}
  .conv-id{font-family:ui-monospace,Consolas,monospace;font-size:11px;color:#8b949e;padding:6px 20px;background:#f6f8fa;border-bottom:1px solid #d0d7de;flex-shrink:0}
  .messages{flex:1;overflow-y:auto;padding:20px}
  .msg{margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
  .msg.user{flex-direction:row-reverse}
  .msg .bubble{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:10px 14px;max-width:78%;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .msg.user .bubble{background:#0969da;color:#fff;border-color:#0969da}
  .msg.agent .bubble{background:#fff}
  .msg .meta{font-size:11px;color:#8b949e;margin-top:4px}
  .tool-card{background:#fff8c5;border:1px solid #eac54f;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px}
  .tool-card .head{font-weight:600;margin-bottom:4px}
  .tool-card pre{margin:6px 0 0;font-family:ui-monospace,Consolas,monospace;font-size:11px;white-space:pre-wrap;word-wrap:break-word;background:rgba(0,0,0,.05);padding:6px 8px;border-radius:4px;max-height:200px;overflow:auto}
  .consent-card{background:#ddf4ff;border:1px solid #54aeff;border-radius:8px;padding:12px 14px;margin:8px 0;font-size:13px;line-height:1.6}
  .consent-card .consent-title{margin-bottom:8px}
  .consent-card .consent-link-button{display:inline-block;background:#0969da;color:#fff;text-decoration:none;font-weight:600;border-radius:6px;padding:8px 12px;margin:2px 0 6px}
  .consent-card .consent-link-button:hover{background:#0550ae;color:#fff}
  .consent-card .consent-help{color:#57606a;margin-top:2px}
  .err{color:#cf222e;font-size:13px;background:#ffebe9;border:1px solid #ff8182;border-radius:6px;padding:8px 12px;margin:8px 0}
  .usage{font-size:11px;color:#8b949e;text-align:center;margin:8px 0}
  .composer{display:flex;gap:8px;padding:12px 20px;border-top:1px solid #d0d7de;background:#fff;flex-shrink:0}
  .composer textarea{flex:1;padding:10px 12px;border:1px solid #d0d7de;border-radius:8px;font-size:14px;font-family:inherit;resize:none;height:44px;max-height:160px;line-height:1.4}
  .composer textarea:focus{outline:none;border-color:#0969da}
  .composer button{background:#0969da;color:#fff;border:0;padding:0 20px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px}
  .composer button:hover{background:#0550ae}
  .composer button:disabled{background:#d0d7de;color:#8b949e;cursor:not-allowed}
  .empty{text-align:center;color:#8b949e;padding:40px;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🧪 Agent test chat</h1>
    <select id="agentPicker">
      <option value="">Loading…</option>
    </select>
    <button id="resetBtn" title="Start a fresh conversation">Reset</button>
  </header>
  <div class="conv-id" id="convId">(no conversation yet)</div>
  <div class="messages" id="messages">
    <div class="empty">Pick an agent and send a message to start.</div>
  </div>
  <form class="composer" id="composer">
    <textarea id="input" placeholder="Type a message…" required></textarea>
    <button type="submit" id="sendBtn">Send</button>
  </form>
</div>
<script>
(async function () {
  const picker  = document.getElementById('agentPicker');
  const convDiv = document.getElementById('convId');
  const messages = document.getElementById('messages');
  const composer = document.getElementById('composer');
  const input    = document.getElementById('input');
  const sendBtn  = document.getElementById('sendBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Load agents from the configured default project.
  let agents = [];
  try {
    const r = await fetch('/admin/agents');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    agents = await r.json();
  } catch (e) {
    picker.innerHTML = `<option>error: ${e.message}</option>`;
    return;
  }
  if (agents.length === 0) {
    picker.innerHTML = '<option>no agents</option>';
    return;
  }
  picker.innerHTML = agents.map(a => `<option value="${a.key}">${a.name}</option>`).join('');

  // Conversation state survives an agent switch only when the user explicitly
  // wants to keep talking — switching agents always resets to keep semantics
  // matched with how Foundry conversations are bound to one agent.
  let convState = { agentKey: null, conversationId: null };

  picker.addEventListener('change', () => resetConversation());
  resetBtn.addEventListener('click', () => resetConversation());

  function resetConversation() {
    if (convState.conversationId) {
      // Best-effort delete (server cleans up Foundry-side).
      fetch(`/admin/chat/conversations/${encodeURIComponent(convState.conversationId)}?agentKey=${encodeURIComponent(convState.agentKey)}`, {
        method: 'DELETE'
      }).catch(() => {});
    }
    convState = { agentKey: null, conversationId: null };
    messages.innerHTML = '<div class="empty">Pick an agent and send a message to start.</div>';
    convDiv.textContent = '(no conversation yet)';
  }

  async function ensureConversation(agentKey) {
    if (convState.agentKey === agentKey && convState.conversationId) return;
    const r = await fetch('/admin/chat/conversations', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ agentKey })
    });
    if (!r.ok) throw new Error(`Create conversation: ${await r.text()}`);
    const data = await r.json();
    convState = { agentKey, conversationId: data.conversationId };
    convDiv.textContent = `${data.agentName} · ${data.conversationId}`;
  }

  composer.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    const agentKey = picker.value;
    sendBtn.disabled = true;
    input.value = '';

    // Clear placeholder
    if (messages.querySelector('.empty')) messages.innerHTML = '';

    appendUser(text);
    const agentBubble = appendAgentPlaceholder();

    try {
      await ensureConversation(agentKey);

      const r = await fetch('/admin/chat/messages', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ agentKey, conversationId: convState.conversationId, message: text })
      });

      if (!r.ok || !r.body) {
        agentBubble.classList.add('err');
        agentBubble.textContent = `HTTP ${r.status}: ${await r.text()}`;
        return;
      }

      // Parse SSE stream.
      const reader  = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        // Each event ends at "\n\n".
        let sep;
        while ((sep = buf.indexOf('\n\n')) >= 0) {
          const block = buf.slice(0, sep);
          buf = buf.slice(sep + 2);
          handleSseBlock(block, agentBubble);
        }
      }
    } catch (e) {
      agentBubble.classList.add('err');
      agentBubble.textContent = e.message;
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });

  function handleSseBlock(block, agentBubble) {
    let eventName = 'message';
    const dataLines = [];
    for (const line of block.split('\n')) {
      if (line.startsWith('event: ')) eventName = line.slice(7).trim();
      else if (line.startsWith('data: ')) dataLines.push(line.slice(6));
    }
    const data = dataLines.join('\n');

    switch (eventName) {
      case 'text':
        agentBubble.textContent += data;
        scrollToBottom();
        break;
      case 'tool': {
        const t = JSON.parse(data);
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.innerHTML =
          `<div class="head">🔧 ${t.kind} · ${t.tool}${t.server ? ` <span style="opacity:.6">on ${t.server}</span>` : ''}</div>` +
          (t.output ? `<pre>${escapeHtml(t.output)}</pre>` : t.args ? `<pre>${escapeHtml(t.args)}</pre>` : '');
        messages.insertBefore(card, agentBubble.parentElement);
        scrollToBottom();
        break;
      }
      case 'consent': {
        const c = JSON.parse(data);
        const card = document.createElement('div');
        card.className = 'consent-card';
        const link = String(c.consentLink || '');
        const isHttps = link.startsWith('https://');
        if (!isHttps) console.warn('Invalid consent link received; not rendering clickable button.', link);
        card.innerHTML =
          `<div class="consent-title">🔑 <strong>Sign-in required</strong> for MCP server <code>${escapeHtml(c.serverLabel)}</code>.</div>` +
          (isHttps
            ? `<a class="consent-link-button" href="${escapeAttr(link)}" target="_blank" rel="noopener">🔗 Open consent link</a>`
            : `<div class="err">Consent link was missing or invalid.</div>`) +
          `<div class="consent-help">Then send your message again.</div>`;
        messages.insertBefore(card, agentBubble.parentElement);
        removeEmptyAgentBubble(agentBubble);
        scrollToBottom();
        break;
      }
      case 'done': {
        const d = JSON.parse(data);
        const usage = document.createElement('div');
        usage.className = 'usage';
        usage.textContent = `📊 ${d.inputTokens} in · ${d.outputTokens} out · ${d.totalTokens} total tokens`;
        messages.appendChild(usage);
        scrollToBottom();
        break;
      }
      case 'error':
        agentBubble.classList.add('err');
        agentBubble.textContent = data;
        break;
    }
  }

  function appendUser(text) {
    const m = document.createElement('div');
    m.className = 'msg user';
    m.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    messages.appendChild(m);
    scrollToBottom();
  }
  function appendAgentPlaceholder() {
    const m = document.createElement('div');
    m.className = 'msg agent';
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = '';
    m.appendChild(b);
    messages.appendChild(m);
    scrollToBottom();
    return b;
  }
  function scrollToBottom() { messages.scrollTop = messages.scrollHeight; }
  function removeEmptyAgentBubble(agentBubble) {
    if (agentBubble.textContent.trim()) return;
    agentBubble.parentElement?.remove();
  }
  function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      composer.requestSubmit();
    }
  });
})();
</script>
</body>
</html>
