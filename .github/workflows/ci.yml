name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=results.trx" --logger "GitHubActions;summary.includePassedTests=false" --results-directory ./TestResults

      - name: Publish test report
        # Posts a check run on the PR with pass/fail counts and per-test details.
        # `if: always()` so failed tests still get a report (and the workflow
        # itself still fails because the test step exited non-zero).
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: dotnet tests
          path: TestResults/results.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # PR / branch builds: verify the Dockerfile builds cleanly against the
      # runner's local docker daemon. No registry push, no buildx — buildx pulls
      # moby/buildkit from Docker Hub which is rate-limited / flaky for
      # unauthenticated runners. Multi-arch + push happens in release.yml.
      - name: Build image (no push)
        run: docker build -t foundry-teams-bot-service-proxy:ci .
